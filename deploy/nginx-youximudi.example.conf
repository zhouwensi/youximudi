# 示例：在「现有 Nginx 不动其他站点」的前提下，为 youximudi.com 增加一个 server {}
# 请把路径、证书路径改成你服务器上的实际值；不要直接覆盖 D:\g\youxijia 或其它站点的配置。
#
# 上线前在 Cloudflare（或 DNS）把 youximudi.com 的 A 记录指向本机公网 IP；
# 若域名在 Cloudflare 且要为 /api 使用「本机 Node」：请删除或改掉占用 youximudi.com/api/* 的 Worker，
# 否则请求进 Worker，到不了本机。（若已改用仓库 workers/api 的 Worker + KV，则保留该路由即可，无需本机 API。）
#
# 1) 安装 Node 18+，在仓库 server 目录：npm install（无依赖可跳过）后 npm start
#    或：node server.mjs
#    默认 127.0.0.1:8788；PORT / LISTEN_HOST 可改。Docker 见 docker-compose.api.yml 内 LISTEN_HOST。
#
# 2) 用 nssm / pm2 / 任务计划程序 等把 node 进程保活（勿占用 80，只监听本机端口即可）。

server {
    listen 443 ssl http2;
    server_name youximudi.com www.youximudi.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    # Linux 示例（请按你实际部署目录修改）
    root /var/www/youximudi;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name youximudi.com www.youximudi.com;
    return 301 https://$host$request_uri;
}
