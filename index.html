<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <title>游戏墓地 — 每一款消逝的游戏，都值得一块墓碑</title>
  <meta name="description" content="一座收录已停服、已取消、被遗忘游戏的像素墓园。来献上你的悼念。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud-fabs" aria-label="快捷操作">
    <button type="button" id="fab-search" class="fab-btn">寻墓</button>
    <button type="button" id="fab-map" class="fab-btn fab-secondary" onclick="toggleMinimap()">地图</button>
  </div>
<!-- 手机虚拟控制：浮动摇杆在触点出现，全屏可拖移 -->
<div id="mobile-controls">
  <div id="joystick-float" class="joystick-float hidden" aria-hidden="true">
    <div id="joystick-float-anchor">
      <div id="joystick-base">
        <div id="joystick-thumb"></div>
      </div>
    </div>
  </div>
  <button type="button" id="mobile-interact-btn">互动</button>
</div>
  <div id="loading">
    <p>🪦 正在挖掘墓地...</p>
  </div>

  <!-- 墓碑弹窗 -->
  <div id="modal-tombstone" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" onclick="closeAllModals()">✕</button>
      <h2 id="tb-name"></h2>
      <div class="meta-row">
        <span id="tb-status" class="badge"></span>
        <span id="tb-genre" class="badge badge-genre"></span>
        <span id="tb-platform" class="badge badge-plat"></span>
      </div>
      <p class="dates" id="tb-dates"></p>
      <p class="dev" id="tb-dev"></p>
      <p class="desc" id="tb-desc"></p>
      <p class="epitaph" id="tb-epitaph"></p>
      <div class="mourn-section">
        <p class="offering-label">选择祭奠方式</p>
        <div class="offering-row">
          <button type="button" class="btn-offering selected" data-offering="daisy" onclick="selectOffering(this)" title="白花">🌼</button>
          <button type="button" class="btn-offering" data-offering="rose" onclick="selectOffering(this)" title="红玫瑰">🌹</button>
          <button type="button" class="btn-offering" data-offering="candle" onclick="selectOffering(this)" title="蜡烛">🕯️</button>
        </div>
        <button id="tb-mourn-btn" class="btn-mourn" onclick="doMourn()"><span id="tb-mourn-label">献出悼念</span> (<span id="tb-mourn-count">0</span>)</button>
      </div>
      <div class="msg-section">
        <h3>💬 墓前留言</h3>
        <div id="tb-messages" class="tb-messages-scroll"></div>
        <div class="msg-form">
          <input id="msg-nick" placeholder="你的名字" maxlength="20">
          <textarea id="msg-text" placeholder="写下你想说的话..." maxlength="200" rows="2"></textarea>
          <button class="btn-send" onclick="postMessage()">留言</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 搜索弹窗 -->
  <div id="modal-search" class="modal-overlay hidden">
    <div class="modal-box modal-wide modal-search-layout">
      <button class="modal-close" onclick="closeAllModals()">✕</button>
      <h2>🔍 寻墓人</h2>
      <div class="search-filters">
        <input id="s-query" placeholder="搜索游戏名..." oninput="doSearch()">
        <select id="s-genre" onchange="doSearch()"><option value="">全部类型</option></select>
        <select id="s-status" onchange="doSearch()">
          <option value="">全部状态</option>
          <option>已停服</option>
          <option>已取消</option>
          <option>名存实亡</option>
          <option>被遗忘的佳作</option>
        </select>
      </div>
      <div class="search-results-wrap">
        <div id="s-results" class="search-results"></div>
        <div id="s-more" class="search-more"></div>
      </div>
      <div class="submit-link">
        找不到？<a href="#" onclick="switchToSubmit();return false;">点此投稿新游戏 →</a>
      </div>
    </div>
  </div>

  <!-- 全站留言墙 -->
  <div id="modal-wall" class="modal-overlay hidden">
    <div class="modal-box modal-wall-box">
      <button type="button" class="modal-close" onclick="closeAllModals()">✕</button>
      <h2>📋 全站留言墙</h2>
      <p class="wall-intro">与整座墓园无关、只想说句话？贴在这里。与墓碑前的留言相互独立。</p>
      <div id="wall-messages" class="tb-messages-scroll"></div>
      <div class="msg-form">
        <input type="text" id="wall-nick" placeholder="你的名字" maxlength="20" autocomplete="nickname">
        <textarea id="wall-text" placeholder="写点什么…" maxlength="200" rows="3"></textarea>
        <button type="button" class="btn-send" onclick="postWallMessage()">贴上墙</button>
        <p id="wall-post-hint" class="wall-post-hint"></p>
      </div>
    </div>
  </div>

  <!-- 投稿弹窗 -->
  <div id="modal-submit" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" onclick="closeAllModals()">✕</button>
      <h2>📝 投稿游戏</h2>
      <form id="submit-form" onsubmit="doSubmit(event)">
        <label>游戏名称 *<input name="name" required></label>
        <label>状态 *
          <select name="status" required>
            <option>已停服</option><option>已取消</option>
            <option>名存实亡</option><option>被遗忘的佳作</option>
          </select>
        </label>
        <label>类型 *<input name="genre" required placeholder="如: MMORPG, 射击, 恐怖"></label>
        <label>平台<input name="platform" placeholder="PC / 主机 / 手游"></label>
        <label>开发商<input name="developer"></label>
        <label>发行商<input name="publisher"></label>
        <label>诞生日期<input name="born" type="date"></label>
        <label>死亡日期<input name="died" type="date"></label>
        <label>简介 *<textarea name="description" required rows="3"></textarea></label>
        <label>墓志铭<input name="epitaph" placeholder="一句话概括"></label>
        <button type="submit" class="btn-submit">提交投稿</button>
      </form>
      <p id="submit-msg"></p>
    </div>
  </div>

  <!-- 静态页与 API 不同源时填写，例如 https://youximudi.com；同源留空即可 -->
  <script>window.YXM_API_ORIGIN = "";</script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.getElementById('fab-search').addEventListener('click', function() {
      if (typeof showSearchModal === 'function') showSearchModal();
    });
  </script>
  <script src="js/engine.js"></script>
  <script src="js/mobile.js"></script>  <!-- ★ 新增 -->
</body>
</html>
