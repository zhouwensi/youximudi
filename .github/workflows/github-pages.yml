# 将仓库内纯静态站点发布到 GitHub Pages（与官方 static 模板对齐）。
# Settings → Pages → Build and deployment → Source 选「GitHub Actions」。
name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 与官方建议一致：勿取消进行中的 Pages 部署，避免半成品上线
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static bundle
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r css js data _site/
          if [ -f CNAME ]; then cp CNAME _site/; fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
